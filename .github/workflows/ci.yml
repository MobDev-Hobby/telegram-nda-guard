name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    # Use the public Go proxy so the build is reproducible outside any
    # corporate network. Local dev machines may override GOPROXY via
    # `go env -w`, but CI must not depend on a private proxy.
    env:
      GOPROXY: https://proxy.golang.org,direct
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    env:
      GOPROXY: https://proxy.golang.org,direct
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
